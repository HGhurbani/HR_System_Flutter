workflows:
  ios-testflight:
    name: iOS (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      # Must match the "App Store Connect API key name" configured in Codemagic:
      # Team settings -> Team integrations -> Developer Portal
      app_store_connect: HR

    environment:
      flutter: stable

      # Fetch signing files uploaded to Codemagic based on these fields.
      # IMPORTANT: Replace with your real Bundle ID that exists in Apple Developer Portal + App Store Connect.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.company.hrSys

      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    scripts:
      - name: Flutter packages
        script: flutter pub get

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - flutter_drive.log

    publishing:
      app_store_connect:
        # Uses the App Store Connect API key stored in Codemagic Team integrations.
        auth: integration

        # For external testing, keep true (requires beta review).
        # For internal testing only, set false.
        submit_to_testflight: true

        # Optional: assign the uploaded build to these TestFlight groups
        # beta_groups:
        #   - Internal Testers
        #   - QA
